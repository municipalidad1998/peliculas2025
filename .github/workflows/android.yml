# Archivo: .github/workflows/android.yml
name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Change to streamflix directory
      run: cd streamflix
    - name: Grant execute permission for gradlew
      run: cd streamflix && chmod +x gradlew
    - name: Build with Gradle
      run: cd streamflix && ./gradlew assembleDebug
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: streamflix/app/build/outputs/apk/debug/app-debug.apk
