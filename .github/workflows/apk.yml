name: Compilar Doramflix APK
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilación del APK (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Clonar código
        uses: actions/checkout@v4
        
      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Descargar Motor Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Instalar Paquetes
        run: flutter pub get
        
      - name: Fabricar el APK Oficial
        run: flutter build apk --release
        
      - name: Guardar APK como descarga
        uses: actions/upload-artifact@v4
        with:
          name: doramflix-app
          path: build/app/outputs/flutter-apk/app-release.apk
